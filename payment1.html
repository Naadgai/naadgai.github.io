        function openTab() {
            // Create link in memory
            const queryString = window.location.search;
            // console.log(queryString);
            const urlParams = new URLSearchParams(queryString);
            const title = urlParams.get('title')
            const url = urlParams.get('url')

            document.getElementById("qpay").onclick = () => window.open(url, "_blank");

            document.getElementById("title").innerHTML = title;
            // getMobileOperatingSystem();
            // document.getElementById("demo").innerHTML = action + " " + getMobileOperatingSystem();
        };

        function getMobileOperatingSystem() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;

            // Windows Phone must come first because its UA also contains "Android"
            if (/windows phone/i.test(userAgent)) {
                return "Windows Phone";
            }

            if (/android/i.test(userAgent)) {
                document.getElementById("ios").innerHTML = "";

                return "Android";
            }

            // iOS detection from: http://stackoverflow.com/a/9039885/177710
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                document.getElementById("android").innerHTML = "";
                return "iOS";
            }

            return "unknown";
        }

        function myfunction() {
            const queryString = window.location.search;
            console.log(queryString);
            const urlParams = new URLSearchParams(queryString);
            const roomid = urlParams.get('roomid')
            const action = "Naadgai://room=" + roomid;
            console.log(action);
            var win = window.open(action, '_blank');
            win.focus();

        }
